services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://kanban:kanban@db:5432/kanban
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      JWT_TTL_HOURS: 24
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"   # Swagger: http://localhost:8000/docs

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
